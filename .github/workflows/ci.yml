# chalk -- CI workflow
#
# Disabled by default during scaffold phase. Enable when ready by adding
# a push or pull_request trigger. The job structure is correct as-is and
# will run on workflow_dispatch (manual trigger) for testing.

name: ci

on:
  workflow_dispatch:
  # Uncomment when ready to enable on push/PR:
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck bootstrap
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          find bootstrap -name '*.sh' -print0 | xargs -0 shellcheck -x
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: go vet
        run: go vet ./...
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "files need formatting:"; echo "$out"; exit 1
          fi

  unit:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: unit tests
        run: go test -race -count=1 -short ./...

  integration:
    runs-on: ubuntu-latest
    needs: unit
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: chalk
          POSTGRES_USER: chalk
          POSTGRES_PASSWORD: chalk
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U chalk"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: integration tests
        env:
          CHALK_TEST_PGURL: postgres://chalk:chalk@127.0.0.1:5432/chalk?sslmode=disable
        run: go test -race -count=1 ./test/integration/...

  build-image:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build chalk image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: chalk:ci
          build-args: |
            VERSION=ci
            GIT_SHA=${{ github.sha }}

  e2e:
    runs-on: ubuntu-latest
    needs: build-image
    if: false   # enabled in phase 13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: playwright
        working-directory: test/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium firefox webkit
          npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: test/e2e/playwright-report
